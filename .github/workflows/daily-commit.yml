name: Daily Commit - 23f3001096

# This runs every day at 9:30 AM UTC
on:
  schedule:
    # Cron syntax: minute hour day month weekday
    # 30 9 * * * = 9:30 AM every day
    - cron: '30 9 * * *'
  # Allow manual trigger too (for testing)
  workflow_dispatch:

jobs:
  daily-commit:
    runs-on: ubuntu-latest
    
    steps:
      # Step 1: Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v3
      
      # Step 2: Configure Git with your email (THIS IS IMPORTANT!)
      - name: Configure Git - 23f3001096@ds.study.iitm.ac.in
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "23f3001096@ds.study.iitm.ac.in"
      
      # Step 3: Create a file with timestamp
      - name: Create daily update file
        run: |
          echo "Daily update: $(date)" > daily-update.txt
          echo "Commit by: 23f3001096" >> daily-update.txt
          echo "Workflow run: ${{ github.run_id }}" >> daily-update.txt
      
      # Step 4: Check if anything changed
      - name: Check for changes
        id: git-check
        run: |
          git status --porcelain
          if [ -n "$(git status --porcelain)" ]; then
            echo "changes=true" >> $GITHUB_OUTPUT
          else
            echo "changes=false" >> $GITHUB_OUTPUT
          fi
      
      # Step 5: Commit and push if there are changes
      - name: Commit and push
        if: steps.git-check.outputs.changes == 'true'
        run: |
          git add daily-update.txt
          git commit -m "Daily automated commit by 23f3001096 - $(date)"
          git push
